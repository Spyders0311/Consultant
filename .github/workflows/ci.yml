name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install -r python_engine/requirements.txt

      - name: Install Node dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Python tests
        run: cd python_engine && python -m pytest tests/ -q

      - name: Node unit tests
        run: npm test

      - name: Sheet field manifest check
        run: npm run check:fields

      - name: Regenerate incorporation status (dry check)
        run: python python_engine/tools/generate_incorporation_status.py
